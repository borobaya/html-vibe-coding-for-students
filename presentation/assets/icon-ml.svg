<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Brain outline -->
  <path d="M24,6 C18,6 14,10 14,15 C10,16 8,20 8,24 C8,28 10,32 14,33 C14,37 18,42 24,42 C30,42 34,37 34,33 C38,32 40,28 40,24 C40,20 38,16 34,15 C34,10 30,6 24,6 Z" fill="#334155" stroke="#38bdf8" stroke-width="2"/>
  <!-- Centre line -->
  <line x1="24" y1="10" x2="24" y2="38" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
  <!-- Data nodes — pulse -->
  <circle cx="18" cy="18" r="2.5" fill="#38bdf8" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="18" r="2.5" fill="#38bdf8" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="18" cy="30" r="2.5" fill="#38bdf8" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="30" r="2.5" fill="#38bdf8" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
  <!-- Connections -->
  <line x1="18" y1="18" x2="30" y2="30" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="18" x2="18" y2="30" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>
</svg>
