<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Speech bubble -->
  <path d="M6,8 L42,8 C42,8 44,8 44,10 L44,30 C44,32 42,32 42,32 L16,32 L10,40 L12,32 L6,32 C6,32 4,32 4,30 L4,10 C4,8 6,8 6,8 Z" fill="#334155" stroke="#38bdf8" stroke-width="2" stroke-linejoin="round"/>
  <!-- Text lines — appear one by one -->
  <line x1="12" y1="15" x2="36" y2="15" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" from="0" to="0.8" begin="0.2s" dur="0.3s" fill="freeze"/>
  </line>
  <line x1="12" y1="21" x2="32" y2="21" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" from="0" to="0.6" begin="0.5s" dur="0.3s" fill="freeze"/>
  </line>
  <line x1="12" y1="27" x2="26" y2="27" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" from="0" to="0.4" begin="0.8s" dur="0.3s" fill="freeze"/>
  </line>
  <!-- Cursor blink -->
  <rect x="27" y="24.5" width="2" height="5" fill="#38bdf8">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>
</svg>
