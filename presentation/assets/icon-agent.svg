<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Robot head -->
  <rect x="12" y="14" width="24" height="20" rx="4" fill="#334155" stroke="#38bdf8" stroke-width="2"/>
  <!-- Antenna -->
  <line x1="24" y1="14" x2="24" y2="8" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="24" cy="6" r="2.5" fill="#38bdf8" opacity="0.6">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Eyes -->
  <circle cx="19" cy="22" r="3" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="29" cy="22" r="3" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="19" cy="22" r="1.5" fill="#38bdf8">
    <animate attributeName="cx" values="19;20;19;18;19" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="29" cy="22" r="1.5" fill="#38bdf8">
    <animate attributeName="cx" values="29;30;29;28;29" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- Mouth -->
  <line x1="19" y1="29" x2="29" y2="29" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tool arm — wrench -->
  <g opacity="0.7">
    <line x1="36" y1="20" x2="42" y2="14" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
    <circle cx="43" cy="13" r="3" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  </g>
  <!-- Tool arm — gear -->
  <g opacity="0.7">
    <line x1="12" y1="20" x2="6" y2="14" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
    <rect x="2" y="10" width="6" height="6" rx="1" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  </g>
</svg>
