<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Magnifying glass -->
  <circle cx="20" cy="20" r="12" fill="#334155" stroke="#38bdf8" stroke-width="2.5"/>
  <line x1="29" y1="29" x2="42" y2="42" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  <!-- Chart bars inside lens -->
  <rect x="13" y="22" width="4" height="8" rx="1" fill="#38bdf8" opacity="0.5">
    <animate attributeName="height" values="8;5;8" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="22;25;22" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="19" y="17" width="4" height="13" rx="1" fill="#38bdf8" opacity="0.7">
    <animate attributeName="height" values="13;9;13" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="y" values="17;21;17" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
  <rect x="25" y="20" width="4" height="10" rx="1" fill="#38bdf8" opacity="0.6">
    <animate attributeName="height" values="10;14;10" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="y" values="20;16;20" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </rect>
</svg>
