<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Code editor window -->
  <rect x="4" y="6" width="40" height="36" rx="4" fill="#334155" stroke="#38bdf8" stroke-width="2"/>
  <!-- Title bar dots -->
  <circle cx="11" cy="12" r="2" fill="#ef4444" opacity="0.6"/>
  <circle cx="17" cy="12" r="2" fill="#eab308" opacity="0.6"/>
  <circle cx="23" cy="12" r="2" fill="#22c55e" opacity="0.6"/>
  <!-- Code lines -->
  <line x1="10" y1="20" x2="20" y2="20" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" from="0" to="0.8" begin="0.2s" dur="0.3s" fill="freeze"/>
  </line>
  <line x1="14" y1="25" x2="30" y2="25" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" from="0" to="0.5" begin="0.5s" dur="0.3s" fill="freeze"/>
  </line>
  <line x1="14" y1="30" x2="26" y2="30" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" from="0" to="0.5" begin="0.8s" dur="0.3s" fill="freeze"/>
  </line>
  <line x1="10" y1="35" x2="22" y2="35" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" from="0" to="0.8" begin="1.1s" dur="0.3s" fill="freeze"/>
  </line>
  <!-- Cursor -->
  <rect x="23" y="33" width="2" height="5" fill="#38bdf8">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>
</svg>
