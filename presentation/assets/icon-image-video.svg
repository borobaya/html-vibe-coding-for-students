<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Image frame -->
  <rect x="4" y="8" width="30" height="24" rx="3" fill="#334155" stroke="#38bdf8" stroke-width="2"/>
  <!-- Mountain landscape -->
  <polygon points="10,28 18,18 26,28" fill="#38bdf8" opacity="0.3"/>
  <polygon points="16,28 22,22 30,28" fill="#38bdf8" opacity="0.2"/>
  <!-- Sun -->
  <circle cx="11" cy="15" r="3" fill="#38bdf8" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Film strip / video -->
  <rect x="28" y="14" width="16" height="26" rx="2" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <rect x="30" y="18" width="12" height="8" rx="1" fill="#334155" stroke="#38bdf8" stroke-width="1"/>
  <rect x="30" y="30" width="12" height="8" rx="1" fill="#334155" stroke="#38bdf8" stroke-width="1"/>
  <!-- Play triangle -->
  <polygon points="34,21 34,24 38,22.5" fill="#38bdf8" opacity="0.7">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="1.5s" repeatCount="indefinite"/>
  </polygon>
  <!-- Film perforations -->
  <circle cx="30" cy="16" r="1" fill="#38bdf8" opacity="0.3"/>
  <circle cx="42" cy="16" r="1" fill="#38bdf8" opacity="0.3"/>
  <circle cx="30" cy="28" r="1" fill="#38bdf8" opacity="0.3"/>
  <circle cx="42" cy="28" r="1" fill="#38bdf8" opacity="0.3"/>
</svg>
