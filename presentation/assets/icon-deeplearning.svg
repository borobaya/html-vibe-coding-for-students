<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Neural network layers -->
  <!-- Layer 1 — input -->
  <circle cx="10" cy="12" r="3" fill="#334155" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="10" cy="24" r="3" fill="#334155" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="10" cy="36" r="3" fill="#334155" stroke="#38bdf8" stroke-width="1.5"/>
  <!-- Layer 2 — hidden -->
  <circle cx="24" cy="10" r="3" fill="#334155" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="24" cy="20" r="3" fill="#334155" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="24" cy="30" r="3" fill="#334155" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="24" cy="40" r="3" fill="#334155" stroke="#38bdf8" stroke-width="1.5"/>
  <!-- Layer 3 — output -->
  <circle cx="38" cy="18" r="3" fill="#334155" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="38" cy="30" r="3" fill="#334155" stroke="#38bdf8" stroke-width="1.5"/>
  <!-- Connections — signal pulse -->
  <g stroke="#38bdf8" stroke-width="0.8" opacity="0.3">
    <line x1="13" y1="12" x2="21" y2="10"/><line x1="13" y1="12" x2="21" y2="20"/>
    <line x1="13" y1="24" x2="21" y2="20"/><line x1="13" y1="24" x2="21" y2="30"/>
    <line x1="13" y1="36" x2="21" y2="30"/><line x1="13" y1="36" x2="21" y2="40"/>
    <line x1="27" y1="10" x2="35" y2="18"/><line x1="27" y1="20" x2="35" y2="18"/>
    <line x1="27" y1="30" x2="35" y2="30"/><line x1="27" y1="40" x2="35" y2="30"/>
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2s" repeatCount="indefinite"/>
  </g>
  <!-- Signal dot travelling -->
  <circle r="2" fill="#38bdf8">
    <animateMotion path="M10,24 L24,20 L38,18" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
