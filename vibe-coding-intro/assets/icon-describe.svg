<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <rect x="4" y="6" width="40" height="30" rx="6" fill="#334155" stroke="#38bdf8" stroke-width="2"/>
  <polygon points="16,36 22,44 28,36" fill="#334155" stroke="#38bdf8" stroke-width="2" stroke-linejoin="round"/>
  <!-- Typing lines appear one by one -->
  <line x1="12" y1="16" x2="36" y2="16" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.3s" fill="freeze"/>
  </line>
  <line x1="12" y1="23" x2="30" y2="23" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.3s" fill="freeze"/>
  </line>
  <line x1="12" y1="29" x2="24" y2="29" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" from="0" to="0.6" begin="1.1s" dur="0.3s" fill="freeze"/>
  </line>
  <!-- Blinking cursor -->
  <rect x="25" y="26" width="2" height="6" fill="#38bdf8">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>
</svg>
