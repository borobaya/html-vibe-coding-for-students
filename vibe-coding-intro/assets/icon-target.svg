<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Target circles — pulse outward (delayed 0.3s for card entrance) -->
  <circle cx="24" cy="24" r="20" fill="none" stroke="#38bdf8" stroke-width="2">
    <animate attributeName="opacity" values="0.15;0.4;0.15" dur="2.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="24" cy="24" r="13" fill="none" stroke="#38bdf8" stroke-width="2">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="24" cy="24" r="6" fill="#38bdf8" opacity="0">
    <animate attributeName="opacity" from="0" to="0.8" begin="0.3s" dur="0.3s" fill="freeze"/>
    <animate attributeName="r" values="5.5;6.5;5.5" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <!-- Arrow — flies in -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.3s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="8 -8" to="0 0" begin="0.8s" dur="0.4s" fill="freeze"/>
    <line x1="38" y1="10" x2="27" y2="21" stroke="#f1f5f9" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="40,4 42,14 36,12" fill="#f1f5f9"/>
  </g>
</svg>
