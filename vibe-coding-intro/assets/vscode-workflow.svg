<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <!-- ===== LEFT: VS Code window ===== -->
  <rect x="0" y="0" width="390" height="400" rx="10" fill="#1e1e2e"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="390" height="28" rx="10" fill="#181825"/>
  <rect x="0" y="10" width="390" height="18" fill="#181825"/>
  <circle cx="16" cy="14" r="4.5" fill="#f38ba8" opacity="0.9"/>
  <circle cx="30" cy="14" r="4.5" fill="#f9e2af" opacity="0.9"/>
  <circle cx="44" cy="14" r="4.5" fill="#a6e3a1" opacity="0.9"/>
  <text x="195" y="18" text-anchor="middle" fill="#a6adc8" font-family="system-ui, sans-serif" font-size="10">VS Code</text>

  <!-- Copilot chat area (full height) -->
  <rect x="8" y="36" width="374" height="28" fill="#11111b" rx="6"/>
  <text x="20" y="54" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="11" font-weight="600">✦ Copilot Chat</text>

  <!-- ===== User message 1 — appears at 0.5s ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.4s" fill="freeze"/>
    <rect x="100" y="76" width="280" height="48" rx="8" fill="#313244"/>
    <text x="112" y="96" fill="#cdd6f4" font-family="system-ui, sans-serif" font-size="11.5">I want to make a quiz game about</text>
    <text x="112" y="112" fill="#cdd6f4" font-family="system-ui, sans-serif" font-size="11.5">animals. Show a question and 4 buttons.</text>
  </g>

  <!-- ===== Typing indicator 1 — appears at 1.2s, hides at 2.4s ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.2s" fill="freeze"/>
    <animate attributeName="opacity" from="1" to="0" begin="2.4s" dur="0.15s" fill="freeze"/>
    <rect x="16" y="136" width="70" height="26" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
    <circle cx="35" cy="149" r="3" fill="#6c7086">
      <animate attributeName="cy" values="149;145;149" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="47" cy="149" r="3" fill="#6c7086">
      <animate attributeName="cy" values="149;145;149" dur="0.5s" begin="0.15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="59" cy="149" r="3" fill="#6c7086">
      <animate attributeName="cy" values="149;145;149" dur="0.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ===== Copilot response 1 — appears at 2.4s ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.4s" fill="freeze"/>
    <rect x="16" y="136" width="310" height="70" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
    <text x="28" y="155" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="10" font-weight="600">✦ Copilot</text>
    <text x="28" y="172" fill="#a6adc8" font-family="system-ui, sans-serif" font-size="11">I've created your animal quiz! It shows</text>
    <text x="28" y="188" fill="#a6adc8" font-family="system-ui, sans-serif" font-size="11">a question with 4 answer buttons. Tap</text>
    <text x="28" y="200" fill="#a6adc8" font-family="system-ui, sans-serif" font-size="11">one to see if you're right. 🎉</text>
  </g>

  <!-- ===== User message 2 — appears at 4.5s ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.4s" fill="freeze"/>
    <rect x="120" y="218" width="260" height="36" rx="8" fill="#313244"/>
    <text x="132" y="240" fill="#cdd6f4" font-family="system-ui, sans-serif" font-size="11.5">Make it keep score and add a timer</text>
  </g>

  <!-- ===== Typing indicator 2 — appears at 5.3s, hides at 6.3s ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="5.3s" dur="0.2s" fill="freeze"/>
    <animate attributeName="opacity" from="1" to="0" begin="6.3s" dur="0.15s" fill="freeze"/>
    <rect x="16" y="266" width="70" height="26" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
    <circle cx="35" cy="279" r="3" fill="#6c7086">
      <animate attributeName="cy" values="279;275;279" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="47" cy="279" r="3" fill="#6c7086">
      <animate attributeName="cy" values="279;275;279" dur="0.5s" begin="0.15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="59" cy="279" r="3" fill="#6c7086">
      <animate attributeName="cy" values="279;275;279" dur="0.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ===== Copilot response 2 — appears at 6.3s ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="6.3s" dur="0.4s" fill="freeze"/>
    <rect x="16" y="266" width="310" height="56" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
    <text x="28" y="285" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="10" font-weight="600">✦ Copilot</text>
    <text x="28" y="302" fill="#a6adc8" font-family="system-ui, sans-serif" font-size="11">Done! There's now a score counter at the</text>
    <text x="28" y="316" fill="#a6adc8" font-family="system-ui, sans-serif" font-size="11">top and a 30-second countdown timer.</text>
  </g>

  <!-- Chat input (always visible) -->
  <rect x="16" y="340" width="358" height="36" rx="8" fill="#313244"/>
  <text x="28" y="362" fill="#6c7086" font-family="system-ui, sans-serif" font-size="11">Ask Copilot anything...</text>
  <!-- Blinking cursor -->
  <rect x="168" y="352" width="1.5" height="12" fill="#6c7086">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  <rect x="340" y="348" width="24" height="20" rx="4" fill="#38bdf8" opacity="0.7"/>
  <text x="352" y="362" text-anchor="middle" fill="#181825" font-family="system-ui, sans-serif" font-size="12" font-weight="700">↑</text>

  <!-- ===== Arrow between — pulses when content appears ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.5s" fill="freeze"/>
    <line x1="400" y1="200" x2="404" y2="200" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
    <polygon points="404,192 418,200 404,208" fill="#38bdf8">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- ===== RIGHT: Browser window ===== -->
  <rect x="420" y="0" width="380" height="400" rx="10" fill="#ffffff"/>
  <!-- Browser chrome -->
  <rect x="420" y="0" width="380" height="36" rx="10" fill="#f1f5f9"/>
  <rect x="420" y="10" width="380" height="26" fill="#f1f5f9"/>
  <circle cx="436" cy="18" r="4.5" fill="#ef4444" opacity="0.7"/>
  <circle cx="450" cy="18" r="4.5" fill="#eab308" opacity="0.7"/>
  <circle cx="464" cy="18" r="4.5" fill="#22c55e" opacity="0.7"/>
  <!-- URL bar -->
  <rect x="480" y="8" width="260" height="20" rx="4" fill="#e2e8f0"/>
  <text x="496" y="22" fill="#64748b" font-family="monospace" font-size="9">localhost:5500</text>

  <!-- Quiz page background (always visible) -->
  <rect x="420" y="36" width="380" height="364" fill="#0f172a"/>

  <!-- ===== Browser content phase 1 — question + answers appear at 2.8s ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.6s" fill="freeze"/>

    <!-- Question card -->
    <rect x="448" y="90" width="324" height="72" rx="12" fill="#1e293b"/>
    <text x="610" y="118" text-anchor="middle" fill="#f1f5f9" font-family="system-ui, sans-serif" font-size="13" font-weight="600">🐾 Question 4 of 10</text>
    <text x="610" y="142" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14">What is the fastest land animal?</text>

    <!-- Answer buttons (staggered) -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.3s" fill="freeze"/>
      <rect x="448" y="178" width="155" height="50" rx="10" fill="#334155" stroke="#475569" stroke-width="1.5"/>
      <text x="525" y="208" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="13">🦁 Lion</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.3s" fill="freeze"/>
      <rect x="617" y="178" width="155" height="50" rx="10" fill="#334155" stroke="#475569" stroke-width="1.5"/>
      <text x="694" y="208" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="13">🐆 Cheetah</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.3s" fill="freeze"/>
      <rect x="448" y="240" width="155" height="50" rx="10" fill="#334155" stroke="#475569" stroke-width="1.5"/>
      <text x="525" y="270" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="13">🐎 Horse</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.8s" dur="0.3s" fill="freeze"/>
      <rect x="617" y="240" width="155" height="50" rx="10" fill="#334155" stroke="#475569" stroke-width="1.5"/>
      <text x="694" y="270" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="13">🦅 Eagle</text>
    </g>

    <!-- Progress dots -->
    <g transform="translate(560, 310)">
      <circle cx="0" cy="0" r="5" fill="#a6e3a1"/>
      <circle cx="16" cy="0" r="5" fill="#a6e3a1"/>
      <circle cx="32" cy="0" r="5" fill="#f38ba8"/>
      <circle cx="48" cy="0" r="5" fill="#38bdf8"/>
      <circle cx="64" cy="0" r="5" fill="#313244"/>
      <circle cx="80" cy="0" r="5" fill="#313244"/>
      <circle cx="96" cy="0" r="5" fill="#313244"/>
      <circle cx="112" cy="0" r="5" fill="#313244"/>
      <circle cx="128" cy="0" r="5" fill="#313244"/>
      <circle cx="144" cy="0" r="5" fill="#313244"/>
    </g>
  </g>

  <!-- ===== Browser content phase 2 — score + timer appear at 6.5s ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="6.5s" dur="0.5s" fill="freeze"/>
    <rect x="438" y="50" width="100" height="24" rx="6" fill="#1e293b"/>
    <text x="450" y="66" fill="#a6e3a1" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Score: 3</text>
    <rect x="682" y="50" width="100" height="24" rx="6" fill="#1e293b"/>
    <text x="700" y="66" fill="#f9e2af" font-family="system-ui, sans-serif" font-size="11" font-weight="600">⏱ 0:24</text>
  </g>

  <!-- Label — fades in at the end -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="7.5s" dur="0.5s" fill="freeze"/>
    <text x="610" y="365" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">Result appears in the browser instantly</text>
  </g>
</svg>
