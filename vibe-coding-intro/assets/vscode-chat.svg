<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" fill="none">
  <!-- VS Code outer frame -->
  <rect x="0" y="0" width="800" height="440" rx="10" fill="#1e1e2e"/>
  
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="32" rx="10" fill="#181825"/>
  <rect x="0" y="10" width="800" height="22" fill="#181825"/>
  <!-- Traffic lights -->
  <circle cx="18" cy="16" r="5.5" fill="#f38ba8" opacity="0.9"/>
  <circle cx="36" cy="16" r="5.5" fill="#f9e2af" opacity="0.9"/>
  <circle cx="54" cy="16" r="5.5" fill="#a6e3a1" opacity="0.9"/>
  <!-- Title -->
  <text x="400" y="20" text-anchor="middle" fill="#a6adc8" font-family="system-ui, sans-serif" font-size="12">index.html — my-cool-site</text>

  <!-- Sidebar -->
  <rect x="0" y="32" width="48" height="408" fill="#11111b"/>
  <!-- Sidebar icons -->
  <rect x="14" y="52" width="20" height="16" rx="2" fill="#6c7086" opacity="0.5"/>
  <rect x="14" y="82" width="20" height="16" rx="2" fill="#6c7086" opacity="0.3"/>
  <rect x="14" y="112" width="20" height="16" rx="2" fill="#6c7086" opacity="0.3"/>
  <!-- Copilot icon (highlighted) -->
  <rect x="12" y="370" width="24" height="20" rx="4" fill="#38bdf8" opacity="0.15"/>
  <text x="24" y="385" text-anchor="middle" fill="#38bdf8" font-size="14">✦</text>

  <!-- File explorer panel -->
  <rect x="48" y="32" width="150" height="408" fill="#181825"/>
  <text x="60" y="52" fill="#a6adc8" font-family="system-ui, sans-serif" font-size="11" font-weight="600">EXPLORER</text>
  <!-- File tree -->
  <text x="60" y="74" fill="#cdd6f4" font-family="monospace" font-size="11">▾ my-cool-site</text>
  <text x="74" y="92" fill="#89b4fa" font-family="monospace" font-size="11">  index.html</text>
  <text x="74" y="108" fill="#a6adc8" font-family="monospace" font-size="11">  ▸ js/</text>
  <text x="74" y="124" fill="#a6adc8" font-family="monospace" font-size="11">  ▸ styles/</text>
  <text x="74" y="140" fill="#a6adc8" font-family="monospace" font-size="11">  ▸ assets/</text>

  <!-- ===== Editor area (left half) ===== -->
  <rect x="198" y="32" width="302" height="408" fill="#1e1e2e"/>
  <!-- Tab bar -->
  <rect x="198" y="32" width="302" height="28" fill="#181825"/>
  <rect x="198" y="32" width="120" height="28" fill="#1e1e2e"/>
  <text x="214" y="50" fill="#89b4fa" font-family="monospace" font-size="11">index.html</text>
  
  <!-- Code lines with line numbers -->
  <text x="210" y="78" fill="#6c7086" font-family="monospace" font-size="12">1</text>
  <text x="232" y="78" fill="#f38ba8" font-family="monospace" font-size="12">&lt;!DOCTYPE html&gt;</text>
  
  <text x="210" y="96" fill="#6c7086" font-family="monospace" font-size="12">2</text>
  <text x="232" y="96" fill="#f38ba8" font-family="monospace" font-size="12">&lt;html</text>
  <text x="273" y="96" fill="#89b4fa" font-family="monospace" font-size="12">lang</text>
  <text x="301" y="96" fill="#cdd6f4" font-family="monospace" font-size="12">=</text>
  <text x="311" y="96" fill="#a6e3a1" font-family="monospace" font-size="12">"en"</text>
  <text x="339" y="96" fill="#f38ba8" font-family="monospace" font-size="12">&gt;</text>

  <text x="210" y="114" fill="#6c7086" font-family="monospace" font-size="12">3</text>
  <text x="232" y="114" fill="#f38ba8" font-family="monospace" font-size="12">&lt;head&gt;</text>

  <text x="210" y="132" fill="#6c7086" font-family="monospace" font-size="12">4</text>
  <text x="246" y="132" fill="#f38ba8" font-family="monospace" font-size="12">&lt;title&gt;</text>
  <text x="302" y="132" fill="#cdd6f4" font-family="monospace" font-size="12">My Cool Site</text>
  <text x="398" y="132" fill="#f38ba8" font-family="monospace" font-size="12">&lt;/title&gt;</text>

  <text x="210" y="150" fill="#6c7086" font-family="monospace" font-size="12">5</text>
  <text x="246" y="150" fill="#f38ba8" font-family="monospace" font-size="12">&lt;link</text>
  <text x="280" y="150" fill="#89b4fa" font-family="monospace" font-size="12">rel</text>
  <text x="303" y="150" fill="#cdd6f4" font-family="monospace" font-size="12">=</text>
  <text x="311" y="150" fill="#a6e3a1" font-family="monospace" font-size="12">"stylesheet"</text>
  <text x="400" y="150" fill="#cdd6f4" font-family="monospace" font-size="12">...</text>

  <text x="210" y="168" fill="#6c7086" font-family="monospace" font-size="12">6</text>
  <text x="232" y="168" fill="#f38ba8" font-family="monospace" font-size="12">&lt;/head&gt;</text>

  <text x="210" y="186" fill="#6c7086" font-family="monospace" font-size="12">7</text>
  <text x="232" y="186" fill="#f38ba8" font-family="monospace" font-size="12">&lt;body&gt;</text>

  <text x="210" y="204" fill="#6c7086" font-family="monospace" font-size="12">8</text>
  <text x="246" y="204" fill="#f38ba8" font-family="monospace" font-size="12">&lt;header&gt;</text>

  <text x="210" y="222" fill="#6c7086" font-family="monospace" font-size="12">9</text>
  <text x="260" y="222" fill="#f38ba8" font-family="monospace" font-size="12">&lt;h1&gt;</text>
  <text x="294" y="222" fill="#cdd6f4" font-family="monospace" font-size="12">My Cool Site</text>
  <text x="390" y="222" fill="#f38ba8" font-family="monospace" font-size="12">&lt;/h1&gt;</text>

  <text x="210" y="240" fill="#6c7086" font-family="monospace" font-size="12">10</text>
  <text x="246" y="240" fill="#f38ba8" font-family="monospace" font-size="12">&lt;/header&gt;</text>

  <text x="210" y="258" fill="#6c7086" font-family="monospace" font-size="12">11</text>
  <text x="246" y="258" fill="#f38ba8" font-family="monospace" font-size="12">&lt;main&gt;</text>

  <text x="210" y="276" fill="#6c7086" font-family="monospace" font-size="12">12</text>
  <text x="260" y="276" fill="#6c7086" font-family="monospace" font-size="12">...</text>

  <!-- Divider line between editor and chat -->
  <rect x="500" y="32" width="1" height="408" fill="#313244"/>

  <!-- ===== Copilot Chat panel (right side) ===== -->
  <rect x="501" y="32" width="299" height="408" fill="#181825"/>
  
  <!-- Chat panel header -->
  <rect x="501" y="32" width="299" height="28" fill="#11111b"/>
  <text x="516" y="50" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="12" font-weight="600">✦ Copilot</text>

  <!-- User message -->
  <rect x="580" y="72" width="204" height="40" rx="8" fill="#313244"/>
  <text x="592" y="89" fill="#cdd6f4" font-family="system-ui, sans-serif" font-size="11.5">Add a dark mode toggle</text>
  <text x="592" y="104" fill="#cdd6f4" font-family="system-ui, sans-serif" font-size="11.5">button in the top right</text>

  <!-- Copilot response -->
  <rect x="516" y="124" width="260" height="76" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
  <text x="528" y="143" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="10" font-weight="600">✦ Copilot</text>
  <text x="528" y="161" fill="#a6adc8" font-family="system-ui, sans-serif" font-size="11.5">Done! There's now a 🌙 button</text>
  <text x="528" y="177" fill="#a6adc8" font-family="system-ui, sans-serif" font-size="11.5">in the top right corner. Click it</text>
  <text x="528" y="193" fill="#a6adc8" font-family="system-ui, sans-serif" font-size="11.5">to switch light ↔ dark mode.</text>

  <!-- User message 2 -->
  <rect x="580" y="214" width="204" height="40" rx="8" fill="#313244"/>
  <text x="592" y="231" fill="#cdd6f4" font-family="system-ui, sans-serif" font-size="11.5">Make confetti fall when I</text>
  <text x="592" y="246" fill="#cdd6f4" font-family="system-ui, sans-serif" font-size="11.5">click the party button 🎉</text>

  <!-- Copilot response 2 -->
  <rect x="516" y="268" width="260" height="76" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
  <text x="528" y="287" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="10" font-weight="600">✦ Copilot</text>
  <text x="528" y="305" fill="#a6adc8" font-family="system-ui, sans-serif" font-size="11.5">Nice idea! I've added a 🎉 button</text>
  <text x="528" y="321" fill="#a6adc8" font-family="system-ui, sans-serif" font-size="11.5">next to the dark mode toggle.</text>
  <text x="528" y="337" fill="#a6adc8" font-family="system-ui, sans-serif" font-size="11.5">Click it and confetti rains down!</text>

  <!-- Chat input -->
  <rect x="516" y="396" width="268" height="32" rx="8" fill="#313244"/>
  <text x="528" y="416" fill="#6c7086" font-family="system-ui, sans-serif" font-size="11">Ask Copilot anything...</text>
  <rect x="754" y="400" width="22" height="22" rx="4" fill="#38bdf8" opacity="0.7"/>
  <text x="765" y="415" text-anchor="middle" fill="#181825" font-family="system-ui, sans-serif" font-size="12" font-weight="700">↑</text>
</svg>
