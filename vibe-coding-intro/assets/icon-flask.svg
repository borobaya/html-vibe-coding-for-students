<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Flask body — fades in with card at 1.1s -->
  <path d="M18,18 L18,6 L30,6 L30,18 L40,40 C41,43 39,46 36,46 L12,46 C9,46 7,43 8,40 Z" fill="#334155" stroke="#38bdf8" stroke-width="2" stroke-linejoin="round" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.4s" fill="freeze"/>
  </path>
  <!-- Flask neck -->
  <line x1="16" y1="6" x2="32" y2="6" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.4s" fill="freeze"/>
  </line>
  <!-- Liquid — gentle wobble -->
  <path d="M14,34 L34,34 L38,42 C39,44 37,46 36,46 L12,46 C11,46 9,44 10,42 Z" fill="#38bdf8">
    <animate attributeName="opacity" values="0;0;0.25;0.4;0.25" dur="3s" begin="1.1s" repeatCount="indefinite"/>
  </path>
  <!-- Bubbles — rise up -->
  <circle cx="20" cy="38" r="2.5" fill="#38bdf8">
    <animate attributeName="cy" values="40;34;40" dur="2.5s" begin="1.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0.3;0.7;0.3" dur="2.5s" begin="1.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="28" cy="36" r="1.8" fill="#38bdf8">
    <animate attributeName="cy" values="38;32;38" dur="3s" begin="1.9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.2" dur="3s" begin="1.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="24" cy="32" r="1.5" fill="#38bdf8">
    <animate attributeName="cy" values="36;28;36" dur="3.5s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0.1" dur="3.5s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Sparkles coming out — twinkle -->
  <circle cx="24" cy="2" r="1.5" fill="#38bdf8">
    <animate attributeName="opacity" values="0;0;0.2;0.8;0.2" dur="1.8s" begin="1.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="18" cy="0" r="1" fill="#38bdf8">
    <animate attributeName="opacity" values="0;0.6;0.1" dur="2.2s" begin="1.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="1" r="1" fill="#38bdf8">
    <animate attributeName="opacity" values="0;0.6;0.1" dur="2s" begin="2.1s" repeatCount="indefinite"/>
  </circle>
</svg>
