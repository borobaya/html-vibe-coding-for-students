<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <!-- Speech bubble -->
  <g transform="translate(60, 30)">
    <rect x="0" y="0" width="140" height="100" rx="16" fill="#334155" stroke="#475569" stroke-width="2"/>
    <polygon points="40,100 60,130 80,100" fill="#334155" stroke="#475569" stroke-width="2" stroke-linejoin="round"/>
    <line x1="24" y1="30" x2="116" y2="30" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <line x1="24" y1="50" x2="100" y2="50" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <line x1="24" y1="70" x2="80" y2="70" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(230, 70)">
    <line x1="0" y1="15" x2="60" y2="15" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
    <polygon points="55,5 75,15 55,25" fill="#38bdf8"/>
  </g>

  <!-- AI / Copilot sparkle -->
  <g transform="translate(310, 20)">
    <rect x="0" y="0" width="140" height="120" rx="16" fill="#334155" stroke="#38bdf8" stroke-width="2"/>
    <!-- Sparkle star -->
    <g transform="translate(70, 55)">
      <path d="M0,-28 L6,-8 L28,-8 L10,4 L16,24 L0,12 L-16,24 L-10,4 L-28,-8 L-6,-8 Z" fill="#38bdf8" opacity="0.9"/>
    </g>
    <!-- Small sparkles -->
    <circle cx="30" cy="30" r="3" fill="#38bdf8" opacity="0.5"/>
    <circle cx="110" cy="25" r="2" fill="#38bdf8" opacity="0.4"/>
    <circle cx="115" cy="95" r="2.5" fill="#38bdf8" opacity="0.5"/>
    <circle cx="25" cy="90" r="2" fill="#38bdf8" opacity="0.3"/>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(480, 70)">
    <line x1="0" y1="15" x2="60" y2="15" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
    <polygon points="55,5 75,15 55,25" fill="#38bdf8"/>
  </g>

  <!-- Browser window -->
  <g transform="translate(560, 20)">
    <rect x="0" y="0" width="140" height="120" rx="12" fill="#334155" stroke="#475569" stroke-width="2"/>
    <!-- Browser bar -->
    <rect x="0" y="0" width="140" height="28" rx="12" fill="#1e293b"/>
    <rect x="0" y="14" width="140" height="14" fill="#1e293b"/>
    <circle cx="18" cy="14" r="4" fill="#ef4444" opacity="0.8"/>
    <circle cx="34" cy="14" r="4" fill="#eab308" opacity="0.8"/>
    <circle cx="50" cy="14" r="4" fill="#22c55e" opacity="0.8"/>
    <!-- Content blocks -->
    <rect x="14" y="40" width="112" height="14" rx="3" fill="#38bdf8" opacity="0.4"/>
    <rect x="14" y="62" width="80" height="10" rx="3" fill="#94a3b8" opacity="0.3"/>
    <rect x="14" y="80" width="50" height="24" rx="6" fill="#38bdf8" opacity="0.7"/>
  </g>

  <!-- Labels -->
  <text x="130" y="185" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14" font-weight="500">You describe</text>
  <text x="380" y="185" text-anchor="middle" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="14" font-weight="500">AI builds</text>
  <text x="630" y="185" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14" font-weight="500">You see it</text>
</svg>
