<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <!-- ===== Step 1: Speech bubble — fades in at 0.3s ===== -->
  <g transform="translate(60, 30)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
    <rect x="0" y="0" width="140" height="100" rx="16" fill="#334155" stroke="#475569" stroke-width="2"/>
    <polygon points="40,100 60,130 80,100" fill="#334155" stroke="#475569" stroke-width="2" stroke-linejoin="round"/>
    <!-- Typing lines appear one by one -->
    <line x1="24" y1="30" x2="116" y2="30" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.3s" fill="freeze"/>
    </line>
    <line x1="24" y1="50" x2="100" y2="50" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.3s" fill="freeze"/>
    </line>
    <line x1="24" y1="70" x2="80" y2="70" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.3s" fill="freeze"/>
    </line>
  </g>

  <!-- "You describe" label -->
  <text x="130" y="185" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14" font-weight="500" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.4s" fill="freeze"/>
    You describe
  </text>

  <!-- ===== Arrow 1 — draws across at 1.8s ===== -->
  <g transform="translate(218, 70)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.4s" fill="freeze"/>
    <line x1="0" y1="15" x2="60" y2="15" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
    <polygon points="55,5 75,15 55,25" fill="#38bdf8"/>
  </g>

  <!-- ===== Step 2: AI sparkle box — fades in at 2.2s ===== -->
  <g transform="translate(310, 20)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.5s" fill="freeze"/>
    <rect x="0" y="0" width="140" height="120" rx="16" fill="#334155" stroke="#38bdf8" stroke-width="2"/>
    <!-- Main sparkle — spins continuously -->
    <g transform="translate(70, 55)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite" additive="sum"/>
      <path d="M0,-28 L6,-8 L28,-8 L10,4 L16,24 L0,12 L-16,24 L-10,4 L-28,-8 L-6,-8 Z" fill="#38bdf8" opacity="0.9"/>
    </g>
    <!-- Small sparkles — twinkle -->
    <circle cx="30" cy="30" r="3" fill="#38bdf8">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="110" cy="25" r="2" fill="#38bdf8">
      <animate attributeName="opacity" values="0.1;0.7;0.1" dur="2s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="115" cy="95" r="2.5" fill="#38bdf8">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.8s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="25" cy="90" r="2" fill="#38bdf8">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="2.2s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- "AI builds" label -->
  <text x="380" y="185" text-anchor="middle" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="14" font-weight="500" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.4s" fill="freeze"/>
    AI builds
  </text>

  <!-- ===== Arrow 2 — draws across at 3.2s ===== -->
  <g transform="translate(468, 70)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.4s" fill="freeze"/>
    <line x1="0" y1="15" x2="60" y2="15" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
    <polygon points="55,5 75,15 55,25" fill="#38bdf8"/>
  </g>

  <!-- ===== Step 3: Browser window — fades in at 3.6s ===== -->
  <g transform="translate(560, 20)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.5s" fill="freeze"/>
    <rect x="0" y="0" width="140" height="120" rx="12" fill="#334155" stroke="#475569" stroke-width="2"/>
    <!-- Browser bar -->
    <rect x="0" y="0" width="140" height="28" rx="12" fill="#1e293b"/>
    <rect x="0" y="14" width="140" height="14" fill="#1e293b"/>
    <circle cx="18" cy="14" r="4" fill="#ef4444" opacity="0.8"/>
    <circle cx="34" cy="14" r="4" fill="#eab308" opacity="0.8"/>
    <circle cx="50" cy="14" r="4" fill="#22c55e" opacity="0.8"/>
    <!-- Content blocks appear in sequence -->
    <rect x="14" y="40" width="112" height="14" rx="3" fill="#38bdf8" opacity="0">
      <animate attributeName="opacity" from="0" to="0.4" begin="4.0s" dur="0.3s" fill="freeze"/>
    </rect>
    <rect x="14" y="62" width="80" height="10" rx="3" fill="#94a3b8" opacity="0">
      <animate attributeName="opacity" from="0" to="0.3" begin="4.3s" dur="0.3s" fill="freeze"/>
    </rect>
    <rect x="14" y="80" width="50" height="24" rx="6" fill="#38bdf8" opacity="0">
      <animate attributeName="opacity" from="0" to="0.7" begin="4.6s" dur="0.3s" fill="freeze"/>
    </rect>
  </g>

  <!-- "You see it" label -->
  <text x="630" y="185" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14" font-weight="500" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.8s" dur="0.4s" fill="freeze"/>
    You see it
  </text>
</svg>
